<section class="page-title">
  <h1>Платежи и переводы</h1>
  <button class="btn-refresh" (click)="loadAccounts()" [disabled]="isLoading">Обновить счета</button>
</section>

<div class="layout-grid">
  <section class="card">
    <h2>Новый перевод</h2>
    <form [formGroup]="transferForm" (ngSubmit)="submitTransfer()" class="form-stack">
      <label for="sender">Счет отправителя</label>
      <select id="sender" formControlName="senderAccountId" (change)="onSenderChanged()">
        <option *ngFor="let acc of accounts" [value]="acc.id">{{ acc.currency }} / ID {{ acc.id }}</option>
      </select>

      <label for="receiver">ID счета получателя</label>
      <input id="receiver" type="number" formControlName="receiverAccountId" min="1" />

      <label for="amount">Сумма</label>
      <input id="amount" type="number" step="0.01" min="0.01" formControlName="amount" />

      <label for="currency">Валюта</label>
      <input id="currency" type="text" formControlName="currency" maxlength="3" />

      <label for="description">Комментарий</label>
      <input id="description" type="text" formControlName="description" maxlength="120" />

      <button class="btn-primary" type="submit" [disabled]="isSubmitting || accounts.length === 0">
        Выполнить перевод
      </button>
    </form>

    <p *ngIf="successMessage" class="message success">{{ successMessage }}</p>
    <p *ngIf="errorMessage" class="message danger">{{ errorMessage }}</p>
  </section>

  <section class="card">
    <h2>Мои счета</h2>
    <p *ngIf="isLoading" class="message">Загрузка...</p>
    <p *ngIf="!isLoading && accounts.length === 0" class="message">Нет доступных счетов для перевода.</p>

    <div *ngFor="let acc of accounts" class="account-row">
      <div>
        <strong>{{ acc.currency }}</strong>
        <div class="meta">ID: {{ acc.id }}</div>
      </div>
      <div class="balance">{{ formatCurrency(acc.balance, acc.currency) }}</div>
    </div>
  </section>
</div>
