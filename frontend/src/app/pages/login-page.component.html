<section class="login-shell">
  <div class="panel">
    <div class="tabs">
      <button class="tab" [class.active]="mode === 'login'" (click)="switchMode('login')">Вход</button>
      <button class="tab" [class.active]="mode === 'register'" (click)="switchMode('register')">Регистрация</button>
    </div>

    <form *ngIf="mode === 'login'" [formGroup]="loginForm" (ngSubmit)="submitLogin()" class="form-stack">
      <h1>Вход в Specto Bank</h1>
      <label for="login-email">Email</label>
      <input id="login-email" type="email" formControlName="email" />

      <label for="login-password">Пароль</label>
      <input id="login-password" type="password" formControlName="password" />

      <button type="submit" class="btn-primary" [disabled]="isSubmitting">Войти</button>
    </form>

    <form *ngIf="mode === 'register'" [formGroup]="registerForm" (ngSubmit)="submitRegister()" class="form-stack">
      <h1>Создать аккаунт</h1>
      <label for="register-name">Имя</label>
      <input id="register-name" type="text" formControlName="name" />

      <label for="register-email">Email</label>
      <input id="register-email" type="email" formControlName="email" />

      <label for="register-password">Пароль</label>
      <input id="register-password" type="password" formControlName="password" />

      <button type="submit" class="btn-primary" [disabled]="isSubmitting">Зарегистрироваться</button>
    </form>

    <p *ngIf="errorMessage" class="message danger">{{ errorMessage }}</p>
  </div>
</section>
