{{define "title"}}Task — Specto{{end}}

{{define "content"}}
<section class="task-detail">
    <h1>{{.Task.Title}}</h1>
    <p class="task-description">{{.Task.Description}}</p>

    <dl>
        <dt>Status</dt>
        <dd><span class="task-badge {{.Task.StatusClass}}">{{.Task.StatusLabel}}</span></dd>

        <dt>Created</dt>
        <dd>{{.Task.CreatedAtFmt}}</dd>

        <dt>Updated</dt>
        <dd>{{.Task.UpdatedAtFmt}}</dd>
    </dl>
</section>
{{end}}
