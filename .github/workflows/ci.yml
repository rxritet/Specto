name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26.0"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Unit tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Fuzz (seed corpus only)
        run: |
          go test -run "^$" -fuzz FuzzDecodeTaskJSON  -fuzztime 10s ./internal/web/
          go test -run "^$" -fuzz FuzzDecodeTaskForm   -fuzztime 10s ./internal/web/
          go test -run "^$" -fuzz FuzzQueryInt64        -fuzztime 10s ./internal/web/
          go test -run "^$" -fuzz FuzzHandleServiceError -fuzztime 10s ./internal/web/

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: test
    services:
      docker:
        image: docker:dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Integration tests (Testcontainers)
        run: go test -tags integration -race -count=1 -timeout 120s ./tests/integration/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w" -o bin/specto-${GOOS}-${GOARCH}${EXT} ./cmd/specto/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: specto-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/
