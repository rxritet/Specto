name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26.0"
  NODE_VERSION: "22"

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend
          args: --timeout=5m

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Unit tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Fuzz (seed corpus only)
        run: |
          go test -run "^$" -fuzz FuzzDecodeTaskJSON   -fuzztime 10s ./internal/web/
          go test -run "^$" -fuzz FuzzDecodeTaskForm   -fuzztime 10s ./internal/web/
          go test -run "^$" -fuzz FuzzQueryInt64       -fuzztime 10s ./internal/web/
          go test -run "^$" -fuzz FuzzHandleServiceError -fuzztime 10s ./internal/web/

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

  backend-integration:
    name: Backend Integration
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Integration tests (Testcontainers)
        env:
          SPECTO_RUN_INTEGRATION: "1"
        run: go test -tags integration -race -count=1 -timeout 120s ./tests/integration/

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: backend-test
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd backend
          mkdir -p bin
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w" -o bin/specto-${GOOS}-${GOARCH}${EXT} ./cmd/specto/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-specto-${{ matrix.goos }}-${{ matrix.goarch }}
          path: backend/bin/

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Unit tests
        run: npm test -- --watch=false --browsers=ChromeHeadless
        working-directory: frontend
